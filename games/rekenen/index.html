<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rekenen</title>
  <link rel="stylesheet" href="../../css/rekenen.css">
  <link rel="stylesheet" href="../css/index.css">

  <style>
    .level-card {
      text-decoration: none;
      color: inherit;
    }

    .level-icon {
      font-size: 2.5rem;
      width: 70px;
      height: 70px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      margin-bottom: 10px;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
    }
  </style>

</head>

<body class="game-page">

  <header class="game-header">
    <a href="../../index.html" class="btn-back">⬅ Terug naar Home</a>
    <h2 style="color: white;">Rekenen Games</h2>
    <div class="score-board" style="display: none;">
      <span>0</span>
    </div>
  </header>

  <main
    style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 2rem; padding: 2rem; width: 100%; max-width: 1200px;">
    <!-- Level 1: Optellen -->
    <section class="levels_container">
      <a href="game.html?op=plus&level=1" class="level-card">
        <div class="level-icon" style="background: linear-gradient(135deg, #00f2ff, #0066ff);">➕</div>
        <div class="info">
          <p class="level-status">Beginner</p>
          <h4>Optellen Level 1</h4>
        </div>
      </a>
    </section>

    <!-- Level 2: Optellen Plus -->
    <section class="levels_container">
      <a href="game.html?op=plus_2&level=2" class="level-card">
        <div class="level-icon" style="background: linear-gradient(135deg, #00f2ff, #00ccff);">➕</div>
        <div class="info">
          <p class="level-status">Gemiddeld</p>
          <h4>Optellen Level 2</h4>
        </div>
      </a>
    </section>

    <!-- Level 3: Aftrekken -->
    <section class="levels_container">

      <a href="game.html?op=min&level=1" class="level-card">
        <div class="level-icon" style="background: linear-gradient(135deg, #ff00ff, #800080);">➖</div>
        <div class="info">
          <p class="level-status">Beginner</p>
          <h4>Aftrekken Level 1</h4>
        </div>
      </a>
    </section>
    <section class="levels_container">

      <!-- Level 4: Keersommen -->
      <a href="game.html?op=keer&level=1" class="level-card">
        <div class="level-icon" style="background: linear-gradient(135deg, #ffcc00, #ff6600);">×</div>
        <div class="info">
          <p class="level-status">Tafels</p>
          <h4>Vermenigvuldigen</h4>
        </div>
      </a>
    </section>
    <section class="levels_container">

      <!-- Level 5: Delen -->
      <a href="game.html?op=div&level=1" class="level-card">
        <div class="level-icon" style="background: linear-gradient(135deg, #00ff88, #009944);">÷</div>
        <div class="info">
          <p class="level-status">Delen</p>
          <h4>Delen Level 1</h4>
        </div>
      </a>
    </section>
    <section class="levels_container">

      <!-- Level 6: Expert Mix -->
      <a href="game.html?op=mix&level=1" class="level-card">
        <div class="level-icon" style="background: linear-gradient(135deg, #ff4d4d, #990000);">🔥</div>
        <div class="info">
          <p class="level-status">Expert</p>
          <h4>Expert Tafels</h4>
        </div>
      </a>
    </section>
  </main>

</body>

</html>

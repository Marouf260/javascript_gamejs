<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Woorden</title>
  <link rel="stylesheet" href="../../css/rekenen.css">

  <style>
    .level-card {
      text-decoration: none;
      color: inherit;
    }

    .level-icon {
      font-size: 2.5rem;
      width: 70px;
      height: 70px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      margin-bottom: 10px;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
    }
  </style>

</head>

<body class="game-page">

  <header class="game-header">
    <a href="../../index.html" class="btn-back" onclick="clickEventListener();">⬅ Terug naar Home</a>
    <h2 style="color: white;">Woorden Games</h2>
    <div class="score-board" style="display: none;">
      <span>0</span>
    </div>
  </header>

  <main></main>
  <main
    style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 2rem; padding: 2rem; width: 100%; max-width: 1200px;">
    
    <!-- Level 1: Optellen -->
    <section class="levels_container" onclick="clickEventListener();">
      <a href="game.html?op=dir&level=1" class="level-card">
        <div class="level-icon" style="background: linear-gradient(135deg, #00f2ff, #0066ff);">🦘</div>
        <div class="info">
          <p class="level-status">Level 1</p>
          <h4>Dieren</h4>
        </div>
      </a>
    </section>

    <!-- Level 2: Optellen Plus -->
    <section class="levels_container" onclick="clickEventListener();">
      <a href="game.html?op=ver&level=2" class="level-card">
        <div class="level-icon" style="background: linear-gradient(135deg, #00f2ff, #00ccff);">🚗</div>
        <div class="info">
          <p class="level-status">Level 2</p>
          <h4>Vervoers</h4>
        </div>
      </a>
    </section>

    <!-- Level 3: Aftrekken -->
    <section class="levels_container" onclick="clickEventListener();">

      <a href="game.html?op=won&level=1" class="level-card">
        <div class="level-icon" style="background: linear-gradient(135deg, #ff00ff, #800080);">🏠</div>
        <div class="info">
          <p class="level-status">Level 3</p>
          <h4>Wonen</h4>
        </div>
      </a>
    </section>
    <section class="levels_container" onclick="clickEventListener();">

      <!-- Level 4: Keersommen -->
      <a href="game.html?op=fam&level=1" class="level-card">
        <div class="level-icon" style="background: linear-gradient(135deg, #ffcc00, #ff6600);">👨‍👩‍👧‍👦</div>
        <div class="info">
          <p class="level-status">Level 4</p>
          <h4>Famili</h4>
        </div>
      </a>
    </section>
    <section class="levels_container" onclick="clickEventListener();">

      <!-- Level 5: Delen -->
      <a href="game.html?op=mix&level=1" class="level-card">
        <div class="level-icon" style="background: linear-gradient(135deg, #00ff88, #009944);">🔥</div>
        <div class="info">
          <p class="level-status">level 5</p>
          <h4>overaal</h4>
        </div>
      </a>
    </section>
    <section class="levels_container" onclick="clickEventListener();">

      <!-- Level 6: Expert Mix -->
      <a href="game.html?op=mix&level=1" class="level-card">
        <div class="level-icon" style="background: linear-gradient(135deg, #ff4d4d, #990000);">🔥</div>
        <div class="info">
          <p class="level-status">Expert</p>
          <h4>Expert</h4>
        </div>
      </a>
    </section>
  </main>

  <footer class="footer">
    <p>&copy;2026 All rights reserved by the developer Marouf Masri</p>
  </footer>
  <script src="/js/script.js"></script>
</body>

</html>

<!doctype html>
<html lang="nl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>memory</title>
  <link rel="stylesheet" href="../../css/memory.css" />
  <link rel="icon" type="image/x-icon" href="../../icons/icon-72x72.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>

<body onload="memoryBackgroundAudio()">
  <div class="stars-fixed"></div>
  <div class="container">
    <div class="header">
      <a href="index.html" class="btn-back">⬅ Terug naar Home</a>
      <h1>
        <i class="fas fa-star"></i> Memory Match <i class="fas fa-star"></i>
      </h1>
      <div class="stats">
        <div class="stat">
          <div class="stat-label">Zetten</div>
          <div class="stat-value" id="moves">0</div>
        </div>
        <div class="stat">
          <div class="stat-label">Thema</div>
          <div class="stat-value" id="opType">space</div>
        </div>
        <div class="stat">
          <div class="stat-label">Tijd</div>
          <div class="stat-value" id="time">0:00</div>
        </div>

        <div class="stat">
          <div class="stat-label">Beste</div>
          <div class="stat-value" id="bestTime">--:--</div>
        </div>

        <div class="stat">
          <div class="stat-label">Paren</div>
          <div class="stat-value" id="matches">0/10</div>
        </div>
      </div>
    </div>
    <div class="game-board" id="gameBoard">
    </div>
    <div class="controls">
      <button class="btn" onclick="newGame()">
        <i class="fas fa-redo"></i> Nieuw Spel
      </button>
    </div>
  </div>
  <div class="modal" id="winModal">
    <div class="modal-content">
      <h2>
        <i class="fas fa-trophy"></i> Gewonnen! <i class="fas fa-trophy"></i>
      </h2>
      <p>
        Zetten: <span id="finalMoves"></span><br />
        Tijd: <span id="finalTime"></span><br />
        Beste Tijd: <span id="finalBest"></span>
      </p>
      <button class="btn" onclick="newGame() ,timerAudioEventListener()">Opnieuw Spelen</button>
    </div>
  </div>

  <script src="../../js/script.js"></script>
  <script src="../../js/memory.js"></script>
</body>

</html>
